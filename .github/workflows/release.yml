name: Release

# Triggers: manually or when you push a tag like v0.1.0
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  # ─── Job 1: compile the Rust binary on each platform ───────────────────────
  build-binary:
    name: Build binary (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            binary: lsp-backend

          - platform: darwin-x64
            runner: macos-13
            target: x86_64-apple-darwin
            binary: lsp-backend

          - platform: linux-x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: lsp-backend

          - platform: win32-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary: lsp-backend.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            lsp-backend/target
          key: ${{ matrix.platform }}-cargo-${{ hashFiles('lsp-backend/Cargo.lock') }}
          restore-keys: ${{ matrix.platform }}-cargo-

      - name: Build release binary
        run: cargo build --release --manifest-path lsp-backend/Cargo.toml --target ${{ matrix.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform }}
          path: lsp-backend/target/${{ matrix.target }}/release/${{ matrix.binary }}

  # ─── Job 2: assemble all binaries into a single .vsix ──────────────────────
  package:
    name: Package .vsix
    needs: build-binary
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Svelte frontend
        run: npm ci && npm run build
        working-directory: lsp-client/dependency-graph

      - name: Install extension dependencies
        run: npm ci
        working-directory: lsp-client

      - name: Compile TypeScript
        run: npm run compile
        working-directory: lsp-client

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: /tmp/binaries

      - name: Copy binaries into extension
        shell: bash
        run: |
          mkdir -p lsp-client/bin/darwin-arm64
          mkdir -p lsp-client/bin/darwin-x64
          mkdir -p lsp-client/bin/linux-x64
          mkdir -p lsp-client/bin/win32-x64

          cp /tmp/binaries/binary-darwin-arm64/lsp-backend   lsp-client/bin/darwin-arm64/lsp-backend
          cp /tmp/binaries/binary-darwin-x64/lsp-backend     lsp-client/bin/darwin-x64/lsp-backend
          cp /tmp/binaries/binary-linux-x64/lsp-backend      lsp-client/bin/linux-x64/lsp-backend
          cp /tmp/binaries/binary-win32-x64/lsp-backend.exe  lsp-client/bin/win32-x64/lsp-backend.exe

          chmod +x lsp-client/bin/darwin-arm64/lsp-backend \
                   lsp-client/bin/darwin-x64/lsp-backend \
                   lsp-client/bin/linux-x64/lsp-backend

      - name: Package .vsix
        run: npx @vscode/vsce package --no-git-tag-version
        working-directory: lsp-client

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: lsp-client/dependency-graph-*.vsix

      # Only runs when triggered by a tag push (v*)
      - name: Create GitHub Release and attach .vsix
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            lsp-client/dependency-graph-*.vsix \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes

      - name: Publish to VS Code Marketplace
        if: startsWith(github.ref, 'refs/tags/v')
        run: npx @vscode/vsce publish --packagePath dependency-graph-*.vsix
        working-directory: lsp-client
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
